<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>DontBlink</title>
	<style>
		html,
		body,
		#canvas {
			margin: 0;
			padding: 0;
			border: 0;
		}

		body {
			color: white;
			background-color: black;
			overflow: hidden;
			touch-action: none;
		}

		#canvas {
			display: block;
		}

		#canvas:focus {
			outline: none;
		}

		#status,
		#status-splash,
		#status-progress {
			position: absolute;
			left: 0;
			right: 0;
		}

		#status,
		#status-splash {
			top: 0;
			bottom: 0;
		}

		#status {
			background-color: #242424;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			visibility: hidden;
		}

		#status-splash {
			max-height: 100%;
			max-width: 100%;
			margin: auto;
		}

		#status-splash.show-image--false {
			display: none;
		}

		#status-splash.fullsize--true {
			height: 100%;
			width: 100%;
			object-fit: contain;
		}

		#status-splash.use-filter--false {
			image-rendering: pixelated;
		}

		#status-progress,
		#status-notice {
			display: none;
		}

		#status-progress {
			bottom: 10%;
			width: 50%;
			margin: 0 auto;
		}

		#status-notice {
			background-color: #5b3943;
			border-radius: 0.5rem;
			border: 1px solid #9b3943;
			color: #e0e0e0;
			font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
			line-height: 1.3;
			margin: 0 2rem;
			overflow: hidden;
			padding: 1rem;
			text-align: center;
			z-index: 1;
		}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
	<link rel="apple-touch-icon" href="index.apple-touch-icon.png" />

</head>

<body>
	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<noscript>
		Your browser does not support JavaScript.
	</noscript>

	<div id="status">
		<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
		<progress id="status-progress"></progress>
		<div id="status-notice"></div>
	</div>

	<script src="index.js"></script>
	<script>
		const GODOT_CONFIG = { "args": [], "canvasResizePolicy": 2, "emscriptenPoolSize": 8, "ensureCrossOriginIsolationHeaders": true, "executable": "index", "experimentalVK": false, "fileSizes": { "index.pck": 182932, "index.wasm": 35739700 }, "focusCanvas": true, "gdextensionLibs": [], "godotPoolSize": 4 };
		const GODOT_THREADS_ENABLED = false;
		const engine = new Engine(GODOT_CONFIG);

		(function () {
			const statusOverlay = document.getElementById('status');
			const statusProgress = document.getElementById('status-progress');
			const statusNotice = document.getElementById('status-notice');

			let initializing = true;
			let statusMode = '';

			function setStatusMode(mode) {
				if (statusMode === mode || !initializing) {
					return;
				}
				if (mode === 'hidden') {
					statusOverlay.remove();
					initializing = false;
					return;
				}
				statusOverlay.style.visibility = 'visible';
				statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
				statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
				statusMode = mode;
			}

			function setStatusNotice(text) {
				while (statusNotice.lastChild) {
					statusNotice.removeChild(statusNotice.lastChild);
				}
				const lines = text.split('\n');
				lines.forEach((line) => {
					statusNotice.appendChild(document.createTextNode(line));
					statusNotice.appendChild(document.createElement('br'));
				});
			}

			function displayFailureNotice(err) {
				console.error(err);
				if (err instanceof Error) {
					setStatusNotice(err.message);
				} else if (typeof err === 'string') {
					setStatusNotice(err);
				} else {
					setStatusNotice('An unknown error occurred.');
				}
				setStatusMode('notice');
				initializing = false;
			}

			const missing = Engine.getMissingFeatures({
				threads: GODOT_THREADS_ENABLED,
			});

			if (missing.length !== 0) {
				if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
					let serviceWorkerRegistrationPromise;
					try {
						serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
					} catch (err) {
						serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
					}
					// There's a chance that installing the service worker would fix the issue
					Promise.race([
						serviceWorkerRegistrationPromise.then((registration) => {
							if (registration != null) {
								return Promise.reject(new Error('Service worker already exists.'));
							}
							return registration;
						}).then(() => engine.installServiceWorker()),
						// For some reason, `getRegistration()` can stall
						new Promise((resolve) => {
							setTimeout(() => resolve(), 2000);
						}),
					]).then(() => {
						// Reload if there was no error.
						window.location.reload();
					}).catch((err) => {
						console.error('Error while registering service worker:', err);
					});
				} else {
					// Display the message as usual
					const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
					displayFailureNotice(missingMsg + missing.join('\n'));
				}
			} else {
				setStatusMode('progress');
				engine.startGame({
					'onProgress': function (current, total) {
						if (current > 0 && total > 0) {
							statusProgress.value = current;
							statusProgress.max = total;
						} else {
							statusProgress.removeAttribute('value');
							statusProgress.removeAttribute('max');
						}
					},
				}).then(() => {
					setStatusMode('hidden');
				}, displayFailureNotice);
			}
		}());
	</script>
	<div id="firebase-ui-shell">

		<!-- TOP BAR (küçük, mobil dostu) -->
		<div class="top-bar">
			<div class="left">
				<div id="auth-user-avatar" class="avatar">?</div>
				<div id="auth-user-name">Guest</div>
			</div>

			<div class="right">
				<button id="btn-google-login">G</button>
				<button id="btn-guest-login">Guest</button>
				<button id="btn-logout">⎋</button>
				<button id="btn-open-leaderboard">🏆</button>
			</div>
		</div>

		<!-- LEADERBOARD (hidden) -->
		<div id="leaderboard-panel" class="leaderboard-panel hidden">
			<div class="lb-header">
				<span>🏆 Top 10</span>
				<button id="btn-close-leaderboard">✕</button>
			</div>

			<div id="my-best-score">My Best: 0</div>
			<div id="top10-list"></div>
		</div>

	</div>

	<style>
		/* ---------- BASE ---------- */
		#firebase-ui-shell {
			position: fixed;
			top: 12px;
			right: 12px;
			z-index: 99999;
			pointer-events: none;
			font-family: Arial, sans-serif;
		}

		.top-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
			padding: 8px 10px;
			background: rgba(10, 18, 34, 0.78);
			backdrop-filter: blur(6px);
			border: 1px solid rgba(110, 160, 255, 0.22);
			border-radius: 12px;
			pointer-events: all;
			min-width: 320px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
		}

		.top-bar .left {
			display: flex;
			align-items: center;
			gap: 8px;
			color: white;
			font-size: 13px;
		}

		.avatar {
			width: 28px;
			height: 28px;
			border-radius: 50%;
			background: #4466aa;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: bold;
		}

		.top-bar .right {
			display: flex;
			gap: 6px;
		}

		.top-bar button {
			border: none;
			padding: 6px 8px;
			border-radius: 8px;
			background: #385996;
			color: white;
			font-size: 12px;
			cursor: pointer;
		}

		/* ---------- LEADERBOARD ---------- */
		.leaderboard-panel {
			position: fixed;
			top: 68px;
			right: 12px;
			width: 280px;
			max-height: 60vh;
			overflow-y: auto;
			background: rgba(10, 18, 34, 0.95);
			border-radius: 12px;
			padding: 12px;
			color: white;
			pointer-events: all;
			box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
		}

		.hidden {
			display: none;
		}

		.lb-header {
			display: flex;
			justify-content: space-between;
			margin-bottom: 10px;
			font-weight: bold;
		}

		#top10-list {
			display: flex;
			flex-direction: column;
			gap: 6px;
		}

		.lb-row {
			display: grid;
			grid-template-columns: 30px 1fr auto;
			gap: 6px;
			padding: 6px;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 8px;
		}

		/* ---------- DESKTOP OVERRIDE ---------- */
		@media (min-width: 768px) {

			.top-bar {
				padding: 12px 20px;
			}

			.top-bar button {
				padding: 8px 12px;
				font-size: 14px;
			}

			.leaderboard-panel {
				width: 340px;
			}
		}

		@media (max-width: 700px) {
			#firebase-ui-shell {
				top: auto;
				right: 10px;
				bottom: 10px;
				left: auto;
			}

			.top-bar {
				min-width: auto;
				max-width: calc(100vw - 20px);
				padding: 8px;
				gap: 6px;
			}

			.top-bar .left {
				gap: 6px;
				font-size: 12px;
			}

			.top-bar button {
				padding: 6px 8px;
				font-size: 12px;
			}

			.leaderboard-panel {
				top: auto;
				right: 10px;
				bottom: 58px;
				width: min(300px, calc(100vw - 20px));
				max-height: 55vh;
			}
		}
	</style>

	<script>
		const panel = document.getElementById("leaderboard-panel");

		document.getElementById("btn-open-leaderboard").onclick = () => {
			panel.classList.remove("hidden");
		};

		document.getElementById("btn-close-leaderboard").onclick = () => {
			panel.classList.add("hidden");
		};
	</script>
</body>

</html>
